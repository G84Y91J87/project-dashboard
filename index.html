<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TITEL -->
    <div class="block title-block">
        <h1>Project Dashboard</h1>
    </div>

    <!-- PROGRESSIE -->
    <div class="block">

        <h2>Voortgang</h2>

        <strong id="progressText">0%</strong>

        <div class="progress">
            <div id="progressFill"></div>
        </div>

    </div>

    <!-- EXPORT -->
    <div class="block">

        <h2>Export</h2>

        <div class="actions">

            <button onclick="exportData()">Export</button>
            <button onclick="file.click()">Import</button>
            <button onclick="resetData()">Wissen</button>

        </div>

        <input type="file" id="file" hidden>

    </div>

    <!-- TABS -->
    <div class="block">

        <h2>Navigatie</h2>

        <div class="tabs">

            <button class="active" data-tab="start">Start</button>
            <button data-tab="algemeen">Algemeen</button>
            <button data-tab="opdracht">Opdracht</button>
            <button data-tab="analyse">Analyse</button>
            <button data-tab="feedback">Feedback</button>
            <button data-tab="handleiding">Handleiding</button>

        </div>

    </div>

    <!-- CONTENT -->
    <div class="block">

        <section id="start" class="active">
            <h2>Welkom</h2>
            <p>Project dashboard voor leerlingen.</p>
        </section>

        <section id="algemeen">
            <h2>Algemeen</h2>

            <input id="naam" placeholder="Naam">
            <input id="klas" placeholder="Klas">
            <input id="richting" placeholder="Richting">
            <input id="schooljaar" placeholder="Schooljaar">
        </section>

        <section id="opdracht">
            <h2>Opdracht</h2>
        </section>

        <section id="analyse">
            <h2>Analyse</h2>
            <textarea id="analyseText"></textarea>
        </section>

        <section id="feedback">
            <h2>Feedback</h2>
            <textarea id="feedbackText"></textarea>
        </section>

        <section id="handleiding">
            <h2>Handleiding</h2>
            <textarea id="handleidingText"></textarea>
        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
