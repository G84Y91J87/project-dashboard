<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- TITEL -->
    <div class="block title-block">
        <h1>Project Dashboard</h1>
    </div>

    <!-- VOORTGANG -->
    <div class="block">

        <h2>Voortgang</h2>

        <strong id="progressText">0%</strong>

        <div class="progress">
            <div id="progressFill"></div>
        </div>

    </div>

    <!-- NAVIGATIE -->
    <div class="block">

        <h2>Navigatie</h2>

        <div class="tabs">

            <button class="tab active" data-tab="algemeen">
                Algemeen
            </button>

            <button class="tab" data-tab="opdracht">
                Opdracht
            </button>

            <button class="tab" data-tab="analyse">
                Analyse
            </button>

            <button class="tab" data-tab="feedback">
                Feedback
            </button>

            <button class="tab" data-tab="handleiding">
                Handleiding
            </button>

        </div>

    </div>

    <!-- CONTENT -->
    <div class="block">

        <section id="algemeen" class="active"></section>
        <section id="opdracht"></section>
        <section id="analyse"></section>
        <section id="feedback"></section>
        <section id="handleiding"></section>

    </div>

    <script src="app.js"></script>

</body>

</html>
