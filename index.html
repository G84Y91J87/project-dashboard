<!DOCTYPE html>
<html lang="nl">

<head>

<!-- INSTELLINGEN -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- TITEL -->
<title>Project Dashboard</title>

<!-- STYLING -->
<style>

/* ALGEMEEN */
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* PAGINA */
body{
    margin:0;
    padding:24px;
    background:#f1f5f9;
    color:#1e293b;
}

/* WITTE BLOKKEN */
.block{
    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:16px;
}

/* TITEL BLOK */
.title-block{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.title-block h1{
    margin:0;
}

/* TITELS */
h2{
    margin-top:0;
}

/* PROGRESS BAR */
.progress{
    height:12px;
    background:#ddd;
    border-radius:999px;
    overflow:hidden;
    margin-top:10px;
}

/* BLAUWE BALK */
.progress div{
    height:100%;
    width:0%;
    background:#2563eb;
    transition:.2s;
}

/* TAB KNOPPEN */
.tabs{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

/* KNOPPEN */
.tabs button,
.actions button{
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    background:#e2e8f0;
    font-weight:bold;
}

/* ACTIEVE TAB */
.tabs button.active{
    background:#2563eb;
    color:#fff;
}

/* FORMULIER ELEMENTEN */
input,
textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}

/* TEXTAREA */
textarea{
    min-height:120px;
    resize:vertical;
}

/* VELD */
.field{
    margin-bottom:16px;
}

/* LABEL */
.field label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

/* MELDING */
.notice{
    background:#e0f2fe;
    border-left:4px solid #2563eb;
    padding:12px;
    border-radius:8px;
    margin-bottom:16px;
}

/* VERBERG SECTIES */
section{
    display:none;
}

/* TOON ACTIEVE SECTIE */
section.active{
    display:block;
}

</style>

</head>

<body>

<!-- TITEL -->
<div class="block title-block">

    <h1>Project Dashboard</h1>

</div>

<!-- VOORTGANG -->
<div class="block">

    <h2>Voortgang</h2>

    <!-- PROCENT -->
    <strong id="progressText">0%</strong>

    <!-- BALK -->
    <div class="progress">
        <div id="progressFill"></div>
    </div>

</div>

<!-- NAVIGATIE -->
<div class="block">

    <h2>Navigatie</h2>

    <div class="tabs">

        <button class="tab active" data-tab="algemeen">
            Algemeen
        </button>

        <button class="tab" data-tab="opdracht">
            Opdracht
        </button>

        <button class="tab" data-tab="analyse">
            Analyse
        </button>

        <button class="tab" data-tab="feedback">
            Feedback
        </button>

        <button class="tab" data-tab="handleiding">
            Handleiding
        </button>

    </div>

</div>

<!-- CONTENT -->
<div class="block">

    <!-- TABS -->
    <section id="algemeen" class="active"></section>
    <section id="opdracht"></section>
    <section id="analyse"></section>
    <section id="feedback"></section>
    <section id="handleiding"></section>

</div>

<!-- JAVASCRIPT -->
<script>

//
// MAAK EEN INPUT OF TEXTAREA
//
function field(label,id,type="input",placeholder="",value="",readonly=false){

    return `
        <div class="field">

            <label for="${id}">
                ${label}
            </label>

            ${
                type === "textarea"
                ? `<textarea id="${id}" placeholder="${placeholder}" ${readonly ? "readonly" : ""}>${value}</textarea>`
                : `<input id="${id}" placeholder="${placeholder}" value="${value}" ${readonly ? "readonly" : ""}>`
            }

        </div>
    `;
}

//
// MAAK EEN MELDING
//
function notice(text){

    return `
        <div class="notice">
            ${text}
        </div>
    `;
}

//
// TAB: ALGEMEEN
//
algemeen.innerHTML = `
    <h2>Algemeen</h2>

    ${notice("Vul eerst je basisgegevens in.")}

    ${field("Naam","naam","input","Naam leerling")}
    ${field("Klas","klas","input","Klas leerling")}
    ${field("Richting","richting","input","Richting leerling")}
    ${field("Schooljaar","schooljaar","input","Schooljaar leerling")}
`;

//
// TAB: OPDRACHT
//
opdracht.innerHTML = `
    <h2>Opdracht</h2>

    ${notice("Neem de opdracht grondig door.")}

    ${field("Omschrijving","omschrijvingText","textarea","","",true)}
`;

//
// TAB: ANALYSE
//
analyse.innerHTML = `
    <h2>Analyse</h2>

    ${notice("Ontwerp hier je IPO-lijst (interactieve elementen, input, vewerking en output)")}

    ${field("Analyse","analyseText","textarea","","",false)}
`;

//
// TAB: FEEDBACK
//
feedback.innerHTML = `
    <h2>Feedback</h2>

    ${field("Feedback","feedbackText","textarea")}
`;

//
// TAB: HANDLEIDING
//
handleiding.innerHTML = `
    <h2>Handleiding</h2>

    ${field("Handleiding","handleidingText","textarea")}
`;

//
// TAB WISSELEN
//
document.querySelectorAll(".tab").forEach(button => {

    button.addEventListener("click", () => {

        // MAAK ALLE TABS INACTIEF
        document.querySelectorAll(".tab")
            .forEach(tab => tab.classList.remove("active"));

        // VERBERG ALLE SECTIES
        document.querySelectorAll("section")
            .forEach(section => section.classList.remove("active"));

        // ACTIVEER GEKLIKTE TAB
        button.classList.add("active");

        // TOON BIJHORENDE SECTIE
        document.getElementById(button.dataset.tab)
            .classList.add("active");

    });

});

//
// UPDATE PROGRESS BAR
//
function updateProgress(){

    // ALLE INPUTS EN TEXTAREAS
    const fields = document.querySelectorAll("input, textarea");

    let filled = 0;

    // TEL INGEVULDE VELDEN
    fields.forEach(field => {

        if(field.value.trim() !== "") filled++;

    });

    // BEREKEN PROCENT
    const progress = Math.round((filled / fields.length) * 100);

    // UPDATE TEKST
    progressText.textContent = progress + "%";

    // UPDATE BALK
    progressFill.style.width = progress + "%";
}

//
// LUISTER NAAR WIJZIGINGEN
//
document.addEventListener("input", updateProgress);

//
// EERSTE UPDATE
//
updateProgress();

</script>

</body>
</html>
